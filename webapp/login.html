<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Login – LoginApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,sans-serif;min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);display:flex;align-items:center;justify-content:center}
    .card{background:rgba(255,255,255,.06);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.12);border-radius:28px;padding:2.5rem;max-width:400px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.5)}
    .logo{width:60px;height:60px;background:linear-gradient(135deg,#6c63ff,#3ecf8e);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto 1.2rem;box-shadow:0 8px 24px rgba(108,99,255,.4)}
    h1{font-size:1.5rem;font-weight:700;color:#fff;text-align:center;margin-bottom:.25rem}
    .sub{text-align:center;color:rgba(255,255,255,.45);font-size:.85rem;margin-bottom:1.6rem}
    .alert{border-radius:10px;padding:.7rem 1rem;font-size:.83rem;font-weight:500;margin-bottom:1.2rem;display:flex;gap:.5rem;align-items:center}
    .err{background:rgba(255,65,108,.15);border:1px solid rgba(255,65,108,.35);color:#ff8fa8}
    .ok{background:rgba(62,207,142,.12);border:1px solid rgba(62,207,142,.35);color:#3ecf8e}
    label{display:block;font-size:.75rem;font-weight:600;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.4rem}
    .grp{margin-bottom:1.1rem;position:relative}
    .ic{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);font-size:.95rem}
    input{width:100%;padding:.75rem 1rem .75rem 2.6rem;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:#fff;font-family:inherit;font-size:.9rem;outline:none;transition:.2s}
    input::placeholder{color:rgba(255,255,255,.25)}
    input:focus{border-color:#6c63ff;background:rgba(108,99,255,.1);box-shadow:0 0 0 3px rgba(108,99,255,.2)}
    .hint{font-size:.72rem;color:rgba(255,255,255,.3);margin-top:.4rem}
    .hint code{background:rgba(255,255,255,.08);padding:1px 5px;border-radius:4px;color:rgba(255,255,255,.5)}
    button{width:100%;padding:.85rem;margin-top:.4rem;background:linear-gradient(135deg,#6c63ff,#4ecdc4);color:#fff;font-family:inherit;font-size:.95rem;font-weight:600;border:none;border-radius:12px;cursor:pointer;box-shadow:0 8px 24px rgba(108,99,255,.4);transition:.2s}
    button:hover{opacity:.9;transform:translateY(-2px)}
    footer{text-align:center;margin-top:1.5rem;font-size:.75rem;color:rgba(255,255,255,.25)}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">🔐</div>
  <h1>Welcome Back</h1>
  <p class="sub">Sign in to your account</p>
  <div id="msg"></div>
  <form action="login" method="POST">
    <div class="grp">
      <label for="u">Username</label>
      <span class="ic">👤</span>
      <input type="text" id="u" name="username" placeholder="Enter username" required/>
      <p class="hint">Demo: <code>admin</code></p>
    </div>
    <div class="grp">
      <label for="p">Password</label>
      <span class="ic">🔑</span>
      <input type="password" id="p" name="password" placeholder="Enter password" required/>
      <p class="hint">Demo: <code>1234</code></p>
    </div>
    <button type="submit">Sign In →</button>
  </form>
  <footer>Java Servlet &bull; Apache Tomcat 9</footer>
</div>
<script>
  const p = new URLSearchParams(location.search);
  if (p.get('error')) document.getElementById('msg').innerHTML = '<div class="alert err">⚠️ ' + p.get('error') + '</div>';
  if (p.get('msg'))   document.getElementById('msg').innerHTML = '<div class="alert ok">✅ ' + p.get('msg') + '</div>';
</script>
</body>
</html>
